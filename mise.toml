# Minimum `mise` version. If not matched, mise guides the user to update.
# -> Bump when relying on a newly introduced setting.
min_version = "2026.6.4" # CVE floor; raise as needed.

# ── 🛠️ tools ──────────────────────────────────────────────────────────────────
# This is a DATA-only Alfred workflow (plist/JSON/SVG/images) — there is NO
# language runtime to install. Only linters/formatters + the hook runner live here.
[tools]

# linters & formatters
prettier = "3"      # JSON format (scoped to *.json in hk.pkl)
taplo = "0.10"      # TOML lint + format (mise.toml & configs)
yamlfmt = "0.21"    # YAML format
yamllint = "1"      # YAML structural lint
typos = "1"         # spell-check
lychee = "0.24"     # link checker
rumdl = "0.2"       # Markdown lint + format
shellcheck = "0.11" # shell lint (used by actionlint for run: blocks)
actionlint = "1"    # GitHub Actions lint
zizmor = "1"        # GitHub Actions security
pinact = "4"        # GitHub Actions pin SHAs
betterleaks = "1"   # secret scanner

# pre-commit
hk = "1.47.0" # full MAJOR.MINOR.PATCH — git-tag backend (matches `hk init`)

# yamllint ships only via pipx (pure-Python). uv installs it; see pipx.uvx below.
uv = "0.9"

# ── 📏 vars ───────────────────────────────────────────────────────────────────
[vars]
setup_version = "1" # Increment when setup steps change / users must re-run setup.

# ── ▶️ tasks ──────────────────────────────────────────────────────────────────
[tasks.check]
description = "Run all linters, formatters & validators as ran by pre-commit and in PR's CI"
alias = ["lint"]
usage = '''
    flag "--fix"              help="apply fixes instead of only reporting"
    flag "--all"              help="run on all files (default: staged only)"
    flag "--pr"               help="only files changed vs the default branch (conflicts with --all)"
    flag "--fail-fast"        help="stop at the first failing step (default: run all, report every failure)"
    flag "--step <step>"      var=#true help="run only these step(s)"
    flag "--skip-step <step>" var=#true help="skip these step(s)"
    complete "step" run="hk check --plan --all --json --no-progress 2>/dev/null | jq -r '.steps[].name'"
'''
run = '''
ff=${usage_fail_fast:+--fail-fast}; ff=${ff:---no-fail-fast}   # default to running every step
hk check $ff ${usage_fix:+--fix} ${usage_all:+--all} ${usage_pr:+--pr} \
  ${usage_step:+$(printf -- '--step %s ' $usage_step)} \
  ${usage_skip_step:+$(printf -- '--skip-step %s ' $usage_skip_step)}
'''

[tasks.test]
description = "Run tests (none — this is a data-only workflow)"
# ordering only; depends run in parallel, don't see this task's env
depends = ["lint"]
run = "echo 'No tests — data-only workflow.'"

[tasks.setup] # one-time, idempotent bootstrap; re-run when `enter` warns it's stale
description = "One-time, idempotent project bootstrap: install tools (no runtime deps)"
depends_post = ["setup:stamp"]                                                          # stamp last (see setup:stamp wait_for)
run = "mise install"                                                                    # installs linters/formatters + hk; no runtime deps for a data repo

[tasks.build]
description = "Build the .alfredworkflow package (zip of the workflow data)"
usage = '''
    flag "--version <version>" help="version string to stamp into info.plist (e.g. v1.4.0)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Zip the workflow data (plist/JSON/SVG/images) into a distributable .alfredworkflow.
# Alfred appends the version to the workflow name, so strip the leading "v".
# The plist carries a placeholder version (1.3.37); stamp the real one in when --version is given.
rm -rf build/
mkdir -p build/

if [ -n "${usage_version:-}" ]; then
  version_without_v="${usage_version#v}"
  artifact="build/alfred-granted-${usage_version}.alfredworkflow"
  # Stamp the version in, build, then restore the placeholder so the working tree stays clean.
  cp info.plist info.plist.bak
  sed "s/1\\.3\\.37/${version_without_v}/g" info.plist.bak > info.plist
  trap 'mv -f info.plist.bak info.plist' EXIT
else
  artifact="build/alfred-granted.alfredworkflow"
fi

# Zip the workflow payload (plist/JSON/SVG/images/README/LICENSE). Exclude repo
# plumbing, the build/ output, and dev-only tooling that shouldn't ship in Alfred.
zip -r "${artifact}" . \
  -x '.git/*' -x '.github/*' -x '.mise/*' -x 'build/*' \
  -x '*.alfredworkflow' -x 'info.plist.bak' -x '.DS_Store' \
  -x '.gitignore' -x '.gitattributes' \
  -x 'mise.toml' -x 'mise.lock' -x 'mise.local.toml' -x 'hk.pkl' \
  -x 'AGENTS.md' -x '.yamllint' -x 'typos.toml' -x '.betterleaks.toml' \
  -x 'lychee.toml' -x 'rumdl.toml'
echo "Built ${artifact}"
'''

[tasks.clean]
description = "Clean build artifacts"
run = '''
#!/usr/bin/env bash
set -euo pipefail
rm -rf build/
rm -f info.plist.bak
echo "Cleaned build artifacts"
'''

[tasks."setup:stamp"] # write the version of the last run setup to .mise/setup
hide = true
quiet = true
run = 'printf %s "{{vars.setup_version}}" > .mise/setup && echo "✅ Setup v{{vars.setup_version}} stamped"'

[tasks."setup:check"] # fast probe (runs on `enter`); warns if setup is stale, never fails
hide = true
quiet = true
run = '[ "$(cat .mise/setup 2>/dev/null)" = "{{vars.setup_version}}" ] || echo "⚠️  Your setup is stale, run: mise run setup" >&2'

# ── 🪝 hooks ──────────────────────────────────────────────────────────────────
[hooks]
enter = "mise run setup:check"    # nudge users when their setup is stale (see vars.setup_version)
postinstall = "hk install --mise" # canonical hook install: runs after every `mise install`, idempotent

# ── ⚙️ settings ───────────────────────────────────────────────────────────────
[settings]
lockfile = true                     # write/commit mise.lock — REQUIRED before any pin resolves reproducibly
minimum_release_age = "7d"          # ignore releases <7d old (supply-chain cooldown)
disable_backends = ["asdf", "vfox"] # resolve only via verified backends
pipx.uvx = true                     # install pipx tools (yamllint) via uv; the bundled-pip path breaks under minimum_release_age on older CI pip

# Use `gh` token to overcome github limits, fallback to gcm if gh is not working.
github.gh_cli_tokens = true
github.use_git_credentials = true
